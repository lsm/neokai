# CI - Build, test, and quality checks
#
# Test execution is flattened based on trigger:
#
# | Trigger               | Tests Run                                      | Rationale                      |
# |-----------------------|-----------------------------------------------|--------------------------------|
# | PR to dev             | check + unit + online                         | Fast feedback for PRs          |
# | Push to dev           | e2e only                                      | Already passed unit/online    |
# | PR to main            | all tests (check + unit + online + e2e + web + CLI) | Full gate              |
# | Push to main          | all tests                                     | Full gate for main branch     |
#
# Release is handled separately in release.yml (triggered by version tags).
# Test coverage (unit, online, web) is uploaded to Coveralls.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================
  # MERGE POLICY ENFORCEMENT
  # ============================================

  enforce-merge-policy:
    name: Enforce Merge Policy
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Check source branch
        run: |
          echo "✅ Merge policy check passed - source: ${{ github.head_ref }}"

  # ============================================
  # CODE QUALITY CHECKS
  # Run on: PR to dev, PR to main, push to main (skip on push to dev)
  # ============================================

  check:
    name: Lint, Knip, Format & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name != 'push' || github.ref != 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Validate online test matrix coverage
        run: bash scripts/validate-online-test-matrix.sh

      - name: Run linter
        id: lint
        run: bun run lint
        continue-on-error: true

      - name: Check formatting
        id: format
        run: bun run format:check
        continue-on-error: true

      - name: Run Knip
        id: knip
        run: bun run knip
        continue-on-error: true

      - name: Run type check
        id: typecheck
        run: bun run typecheck
        continue-on-error: true

      - name: Check for failures
        if: steps.lint.outcome == 'failure' || steps.format.outcome == 'failure' || steps.knip.outcome == 'failure' || steps.typecheck.outcome == 'failure'
        run: |
          echo "One or more checks failed:"
          echo "  Lint: ${{ steps.lint.outcome }}"
          echo "  Format: ${{ steps.format.outcome }}"
          echo "  Knip: ${{ steps.knip.outcome }}"
          echo "  Typecheck: ${{ steps.typecheck.outcome }}"
          exit 1

  # ============================================
  # DAEMON ONLINE TESTS (Require API credentials)
  # Run on: PR to dev, PR to main, push to main (skip on push to dev)
  # ============================================

  test-daemon-online:
    name: Daemon Online (${{ matrix.module }})
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag' && (github.event_name != 'push' || github.ref != 'refs/heads/dev')
    timeout-minutes: ${{ matrix.timeout || 5 }}

    strategy:
      fail-fast: false
      matrix:
        module:
          - agent-context
          - agent-sdk
          - components
          - coordinator
          - convo
          - features-1
          - features-2
          - git
          - lifecycle
          - mcp
          - providers-anthropic-to-codex-bridge
          - providers-anthropic-copilot
          - rewind
          # Room tests temporarily disabled during refactoring
          # - room-1
          # - room-multi-agent
          # - room-replan
          # - room-planner
          # - room-reviewer
          - rpc-1
          - rpc-2
          - rpc-3
          - sdk
          - websocket
        include:
          # mock_sdk: true → uses Dev Proxy (NEOKAI_USE_DEV_PROXY) for mocking instead of real API calls.
          # These modules test infrastructure/plumbing and don't need real AI responses.
          # To run with real API locally, just omit the env var.
          #
          # Modules with directory-level test_path auto-discover new test files.
          # Split modules (rpc-*, room-*, features-*) use explicit file lists.
          # Run `bash scripts/validate-online-test-matrix.sh` to verify all files are covered.
          - module: agent-context
            test_path: tests/online/agent/context-command.test.ts
            mock_sdk: true
          - module: agent-sdk
            test_path: tests/online/agent/agent-session-sdk.test.ts
            mock_sdk: true
          - module: components
            test_path: tests/online/components
            mock_sdk: true
          # GLM online tests disabled due to flakiness
          # - module: glm
          #   test_path: tests/online/glm
          - module: convo
            test_path: tests/online/convo
            mock_sdk: true
          - module: coordinator
            test_path: tests/online/coordinator
            timeout: 10
            mock_sdk: true
          - module: features-1
            test_path: >-
              tests/online/features/auto-title.test.ts
              tests/online/features/message-delivery-mode-queue.test.ts
            mock_sdk: true
          - module: features-2
            test_path: tests/online/features/message-persistence.test.ts
            mock_sdk: true
          - module: git
            test_path: tests/online/git
            timeout: 10
            default_provider: minimax
          - module: lifecycle
            test_path: tests/online/lifecycle
            mock_sdk: true
          - module: mcp
            test_path: tests/online/mcp
            mock_sdk: true
          - module: providers-anthropic-to-codex-bridge
            test_path: tests/online/providers/anthropic-to-codex-bridge-provider.test.ts
          - module: providers-anthropic-copilot
            test_path: tests/online/providers/anthropic-to-copilot-bridge-provider.test.ts
            timeout: 15
          - module: rewind
            test_path: tests/online/rewind
            mock_sdk: true
          # Room tests temporarily disabled during refactoring
          # - module: room-1
          #   test_path: >-
          #     tests/online/room/room-advanced-scenarios.test.ts
          #     tests/online/room/room-chat-agent-tools.test.ts
          #     tests/online/room/room-chat-constraints.test.ts
          #   timeout: 10
          # - module: room-multi-agent
          #   test_path: tests/online/room/room-multi-agent-flow.test.ts
          #   timeout: 10
          # - module: room-replan
          #   test_path: tests/online/room/room-replan-recovery.test.ts
          #   timeout: 10
          # - module: room-planner
          #   test_path: tests/online/room/room-planner-two-phase.test.ts
          #   timeout: 10
          # - module: room-reviewer
          #   test_path: tests/online/room/room-reviewer-flow.test.ts
          #   timeout: 10
          - module: rpc-1
            test_path: >-
              tests/online/rpc/rpc-agent-handlers.test.ts
              tests/online/rpc/rpc-config-handlers.test.ts
              tests/online/rpc/rpc-draft-handlers.test.ts
              tests/online/rpc/rpc-file-handlers.test.ts
              tests/online/rpc/rpc-interrupt-handlers.test.ts
              tests/online/rpc/rpc-mcp-toggle.test.ts
              tests/online/rpc/rpc-task-draft-handlers.test.ts
            mock_sdk: true
          - module: rpc-2
            test_path: >-
              tests/online/rpc/rpc-message-handlers.test.ts
              tests/online/rpc/rpc-model-handlers.test.ts
              tests/online/rpc/rpc-model-switching.test.ts
              tests/online/rpc/rpc-remove-output.test.ts
              tests/online/rpc/rpc-rewind-handlers.test.ts
              tests/online/rpc/rpc-session-filtering.test.ts
            mock_sdk: true
          - module: rpc-3
            test_path: >-
              tests/online/rpc/rpc-session-handlers-extended.test.ts
              tests/online/rpc/rpc-session-workflow.test.ts
              tests/online/rpc/rpc-settings-handlers.test.ts
              tests/online/rpc/rpc-state-sync.test.ts
              tests/online/rpc/session-handlers.test.ts
            mock_sdk: true
          - module: sdk
            test_path: tests/online/sdk
            mock_sdk: true
          - module: websocket
            test_path: tests/online/websocket
            mock_sdk: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Setup Dev Proxy
        if: runner.os == 'Linux' && matrix.mock_sdk == true
        uses: ./.github/actions/setup-devproxy

      - name: Install dependencies
        run: bun install

      - name: Install Codex CLI (providers-anthropic-to-codex-bridge shard)
        if: matrix.module == 'providers-anthropic-to-codex-bridge'
        run: npm install -g @openai/codex

      - name: Run daemon online tests (${{ matrix.module }})
        working-directory: packages/daemon
        run: bun test ${{ matrix.test_path }} --coverage --coverage-reporter=lcov --coverage-dir=coverage-online-${{ matrix.module }}
        env:
          # Use Dev Proxy for mock_sdk tests by setting ANTHROPIC_BASE_URL
          # This avoids proxy env var issues and TLS interception problems
          NEOKAI_USE_DEV_PROXY: ${{ matrix.mock_sdk == true && '1' || '' }}
          NEOKAI_TEST_DISABLE_SANDBOX: '1'
          ANTHROPIC_BASE_URL: ${{ matrix.mock_sdk == true && 'http://127.0.0.1:8000' || '' }}
          # For Dev Proxy tests, never pass real Anthropic credentials.
          ANTHROPIC_API_KEY: ${{ matrix.mock_sdk == true && 'sk-devproxy-test-key' || ((startsWith(matrix.module, 'features') || startsWith(matrix.module, 'room')) && secrets.ANTHROPIC_API_KEY || '') }}
          ANTHROPIC_AUTH_TOKEN: ""
          CLAUDE_CODE_OAUTH_TOKEN: ${{ matrix.mock_sdk != true && (startsWith(matrix.module, 'features') || startsWith(matrix.module, 'room')) && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          OPENAI_API_KEY: ${{ matrix.module == 'providers-anthropic-to-codex-bridge' && secrets.OPENAI_API_KEY || '' }}
          # Requires a PAT with the `copilot_requests` scope stored as COPILOT_GITHUB_TOKEN.
          # secrets.GITHUB_TOKEN is a repo-scoped installation token and cannot authenticate Copilot API calls.
          # If the secret is absent the env var is empty and the test FAILS (hard-fail, not skip — by design).
          COPILOT_GITHUB_TOKEN: ${{ matrix.module == 'providers-anthropic-copilot' && secrets.COPILOT_GITHUB_TOKEN || '' }}
          GLM_API_KEY: ${{ matrix.mock_sdk != true && secrets.GLM_API_KEY || '' }}
          MINIMAX_API_KEY: ${{ matrix.mock_sdk != true && secrets.MINIMAX_API_KEY || '' }}
          # Prefer MiniMax for online tests when available; fallback to GLM.
          DEFAULT_PROVIDER: ${{ matrix.mock_sdk != true && (matrix.default_provider || (secrets.MINIMAX_API_KEY != '' && 'minimax' || 'glm')) || '' }}
          # Prefer MiniMax highspeed as the default model when using MiniMax.
          DEFAULT_MODEL: ${{ matrix.mock_sdk != true && secrets.MINIMAX_API_KEY != '' && 'MiniMax-M2.5-highspeed' || '' }}

      - name: Stop Dev Proxy
        if: always() && matrix.mock_sdk == true
        run: |
          if [ -n "$DEVPROXY_PID" ]; then
            kill $DEVPROXY_PID 2>/dev/null || true
          fi

      - name: Fix coverage paths and strip test utilities
        working-directory: packages/daemon
        run: |
          LCOV=coverage-online-${{ matrix.module }}/lcov.info
          # Fix paths: Bun generates relative to package dir, need repo root paths
          sed -i 's|^SF:src/|SF:packages/daemon/src/|g' $LCOV || true
          sed -i 's|^SF:\.\./shared/|SF:packages/shared/|g' $LCOV || true
          # Strip test utility coverage (helpers, fixtures, mocks)
          awk '/^SF:(packages\/daemon\/)?tests\//{skip=1} /^end_of_record/{if(skip){skip=0;next}} !skip' $LCOV > ${LCOV}.clean && mv ${LCOV}.clean $LCOV || true

      - name: Upload to Coveralls (parallel)
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/daemon/coverage-online-${{ matrix.module }}/lcov.info
          flag-name: daemon-online-${{ matrix.module }}
          parallel: true
          fail-on-error: false

  # ============================================
  # DAEMON + SHARED UNIT TESTS (For coverage measurement)
  # Run on: PR to dev, PR to main, push to main (skip on push to dev)
  # ============================================

  test-daemon-shared-unit:
    name: Daemon + Shared Unit Tests (Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name != 'push' || github.ref != 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Install dependencies
        run: bun install

      - name: Run daemon + shared unit tests from root
        run: make test-daemon
        env:
          GLM_API_KEY: ""
          CLAUDE_CODE_OAUTH_TOKEN: ""

      - name: Strip test utility coverage
        run: |
          # Strip test utility coverage (helpers, fixtures, mocks)
          awk '/^SF:(packages\/daemon\/)?tests\//{skip=1} /^end_of_record/{if(skip){skip=0;next}} !skip' coverage/lcov.info > coverage/lcov.clean && mv coverage/lcov.clean coverage/lcov.info || true

      - name: Upload to Coveralls (parallel)
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          flag-name: daemon
          parallel: true
          fail-on-error: false

  # ============================================
  # WEB TESTS
  # Run on: PR to main, push to main, workflow_dispatch (skip on PR to dev and push to dev)
  # ============================================

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request' && github.base_ref == 'main' || github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Install dependencies
        run: bun install

      - name: Run web tests
        working-directory: packages/web
        run: bun run coverage

      - name: Fix coverage paths for monorepo
        run: |
          # Vitest generates paths relative to package dir (src/...)
          # Coveralls needs paths relative to repo root (packages/web/src/...)
          sed -i 's|^SF:src/|SF:packages/web/src/|g' packages/web/coverage/lcov.info
          # Fix cross-package paths (../shared/src/... -> packages/shared/src/...)
          sed -i 's|^SF:\.\./shared/|SF:packages/shared/|g' packages/web/coverage/lcov.info

      - name: Upload to Coveralls (parallel)
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: packages/web/coverage/lcov.info
          flag-name: web
          parallel: true
          fail-on-error: false

  # ============================================
  # CLI TESTS
  # Run on: PR to main, push to main, workflow_dispatch (skip on PR to dev and push to dev)
  # ============================================

  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request' && github.base_ref == 'main' || github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Install dependencies
        run: bun install

      - name: Run CLI tests
        working-directory: packages/cli
        run: bun test

  # ============================================
  # COVERALLS FINALIZATION
  # Merges all parallel coverage uploads
  # Run on: PR to dev, PR to main, push to main, workflow_dispatch (skip on push to dev)
  # ============================================

  coveralls-finalize:
    name: Finalize Coveralls
    runs-on: ubuntu-latest
    needs: [test-daemon-shared-unit, test-web, test-daemon-online]
    timeout-minutes: 1
    if: github.event_name != 'push' || github.ref != 'refs/heads/dev' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Finalize Coveralls parallel build
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          fail-on-error: true

  # ============================================
  # COVERAGE QUALITY GATE
  # Verifies minimum coverage and regression thresholds via Coveralls API.
  # Run on: PR to dev, PR to main, push to main, workflow_dispatch (skip on push to dev)
  # ============================================

  coverage-gate:
    name: Coverage Quality Gate
    runs-on: ubuntu-latest
    needs: [coveralls-finalize]
    timeout-minutes: 3
    if: github.event_name != 'push' || github.ref != 'refs/heads/dev' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check coverage thresholds via Coveralls API
        run: |
          echo "Querying Coveralls for commit ${{ github.sha }}..."

          # Retry logic — Coveralls may take time to process the finalized build
          MAX_RETRIES=6
          RETRY_DELAY=15
          RESPONSE=""

          for attempt in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /tmp/coveralls.json -w "%{http_code}" \
              "https://coveralls.io/builds/${{ github.sha }}.json" 2>/dev/null) || true

            if [ "$HTTP_CODE" = "200" ]; then
              RESPONSE=$(cat /tmp/coveralls.json)
              break
            fi

            echo "Attempt $attempt/$MAX_RETRIES: Coveralls API returned HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          if [ -z "$RESPONSE" ]; then
            echo "⚠️ Could not fetch coverage from Coveralls API after $MAX_RETRIES attempts"
            echo "Skipping coverage gate (API unavailable)"
            exit 0
          fi

          COVERED_PERCENT=$(echo "$RESPONSE" | jq -r '.covered_percent // empty')
          COVERAGE_CHANGE=$(echo "$RESPONSE" | jq -r '.coverage_change // "0"')

          if [ -z "$COVERED_PERCENT" ]; then
            echo "⚠️ Coveralls response missing coverage data"
            echo "Skipping coverage gate"
            exit 0
          fi

          echo "==============================="
          echo "📊 Project Coverage: ${COVERED_PERCENT}%"
          echo "📈 Coverage Change:  ${COVERAGE_CHANGE}%"
          echo "==============================="

          FAILED=0

          # --- Project gate: minimum overall coverage ---
          MIN_COVERAGE=30
          if (( $(echo "$COVERED_PERCENT < $MIN_COVERAGE" | bc -l) )); then
            echo "❌ FAIL: Project coverage ${COVERED_PERCENT}% is below minimum ${MIN_COVERAGE}%"
            FAILED=1
          else
            echo "✅ Project coverage meets minimum threshold (>= ${MIN_COVERAGE}%)"
          fi

          # --- Regression gate: coverage must not drop more than threshold ---
          MAX_REGRESSION=-2
          if [ "$COVERAGE_CHANGE" != "null" ] && [ -n "$COVERAGE_CHANGE" ]; then
            if (( $(echo "$COVERAGE_CHANGE < $MAX_REGRESSION" | bc -l) )); then
              echo "❌ FAIL: Coverage regressed by ${COVERAGE_CHANGE}% (max allowed: ${MAX_REGRESSION}%)"
              FAILED=1
            else
              echo "✅ Coverage regression within acceptable range (change: ${COVERAGE_CHANGE}%)"
            fi
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Coverage quality gate FAILED"
            exit 1
          fi

          echo ""
          echo "✅ Coverage quality gate passed!"

  # ============================================
  # BUILD - Compile linux-x64 binary + smoke test
  # Run on: PR to main, push to dev, push to main (skip on PR to dev)
  # Waits for test jobs; proceeds if they passed or were skipped (push to dev).
  # ============================================

  build:
    name: Build Binary (linux-x64)
    runs-on: ubuntu-latest
    needs: [check, test-daemon-online, test-daemon-shared-unit, test-web, test-cli]
    if: >-
      always() &&
      (github.event_name == 'pull_request' && github.base_ref == 'main' ||
       github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      contains(fromJSON('["success", "skipped"]'), needs.check.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.test-daemon-online.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.test-daemon-shared-unit.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.test-web.result) &&
      contains(fromJSON('["success", "skipped"]'), needs.test-cli.result)
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Install dependencies
        run: bun install

      - name: Build web frontend
        run: cd packages/web && bun run build

      - name: Generate embedded assets
        run: bun run scripts/generate-embedded-assets.ts

      - name: Compile binary
        run: bun build --compile --target=bun-linux-x64 --outfile=dist/bin/kai-linux-x64 packages/cli/prod-entry.ts

      - name: Smoke test
        run: bun run scripts/smoke-test.ts ./dist/bin/kai-linux-x64
        env:
          GLM_API_KEY: smoke-test

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-linux-x64-e2e
          path: dist/bin/kai-linux-x64

  # ============================================
  # DISCOVER TESTS
  # Auto-discover and categorize E2E test files
  # Tests are split into two groups:
  #   - no-llm: UI-only tests (run fully parallel)
  #   - llm: Tests requiring LLM round-trips (max 4 parallel)
  # Run on: PR to main, push to dev, push to main (skip on PR to dev)
  # ============================================

  discover:
    name: Discover Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' || github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    outputs:
      tests_no_llm: ${{ steps.categorize.outputs.tests_no_llm }}
      tests_llm: ${{ steps.categorize.outputs.tests_llm }}
    steps:
      - uses: actions/checkout@v4

      - name: Categorize E2E test files
        id: categorize
        run: |
          # Tests that require LLM API round-trips (send messages, wait for agent responses)
          # Format: subdir/name (matching the subdirectory structure under packages/e2e/tests/)
          # These tests need a real LLM provider (GLM) to process messages
          LLM_TESTS=(
            core/message-flow
            core/interrupt-button
            core/interrupt-error-bug
            core/context-features
            core/model-selection
            features/archive
            features/file-operations
            features/message-operations
            features/rewind-features
            features/session-operations
            features/slash-cmd
            features/worktree-isolation
            responsive/mobile
            responsive/tablet
            settings/auto-title
          )

          # Tests to exclude entirely (disabled, pending refactor)
          EXCLUDED_TESTS=(
          )

          # Build lookup sets
          declare -A LLM_SET EXCLUDED_SET
          for t in "${LLM_TESTS[@]}"; do LLM_SET[$t]=1; done
          for t in "${EXCLUDED_TESTS[@]}"; do EXCLUDED_SET[$t]=1; done

          # Find all test files recursively and extract subdir/name paths
          NO_LLM_JSON="[]"
          LLM_JSON="[]"
          for file in $(find packages/e2e/tests -name "*.e2e.ts" -type f | sed 's|packages/e2e/tests/||; s|\.e2e\.ts$||' | sort); do
            if [[ -n "${EXCLUDED_SET[$file]}" ]]; then
              echo "EXCLUDED: $file"
              continue
            fi
            # Create JSON object with path (for test runner) and name (for artifact/display)
            safe_name=$(echo "$file" | tr '/' '-')
            entry=$(jq -n -c --arg path "$file" --arg name "$safe_name" '{path: $path, name: $name}')
            if [[ -n "${LLM_SET[$file]}" ]]; then
              LLM_JSON=$(echo "$LLM_JSON" | jq -c ". + [$entry]")
            else
              NO_LLM_JSON=$(echo "$NO_LLM_JSON" | jq -c ". + [$entry]")
            fi
          done

          no_llm_count=$(echo "$NO_LLM_JSON" | jq length)
          llm_count=$(echo "$LLM_JSON" | jq length)
          echo "No-LLM tests ($no_llm_count): $NO_LLM_JSON"
          echo "LLM tests ($llm_count): $LLM_JSON"

          echo "tests_no_llm=$NO_LLM_JSON" >> $GITHUB_OUTPUT
          echo "tests_llm=$LLM_JSON" >> $GITHUB_OUTPUT

  # ============================================
  # E2E TESTS - No LLM (Matrix, fully parallel)
  # UI-only tests that don't require LLM API calls
  # Run on: PR to main, push to dev, push to main (skip on PR to dev)
  # ============================================

  e2e-no-llm:
    name: E2E No-LLM (${{ matrix.test.name }})
    runs-on: ubuntu-latest
    needs: [build, discover]
    # Runs when build succeeds; skip release PRs to avoid blocking releases with flaky tests
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.discover.result == 'success' &&
      (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, 'release'))
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests_no_llm) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Install dependencies
        run: |
          echo "Starting bun install at $(date)"
          timeout 180 bun install --verbose 2>&1 || {
            echo "bun install timed out or failed"
            exit 1
          }
          echo "Finished bun install at $(date)"

      - name: Install Playwright browsers
        run: cd packages/e2e && bunx playwright install chromium

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: kai-linux-x64-e2e
          path: dist/bin/

      - name: Run E2E test (${{ matrix.test.name }})
        run: |
          chmod +x dist/bin/kai-linux-x64
          WORKSPACE=$(mktemp -d)
          PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("",0)); print(s.getsockname()[1]); s.close()')
          echo "Starting binary on port $PORT with workspace $WORKSPACE"

          ./dist/bin/kai-linux-x64 --port "$PORT" "$WORKSPACE" &
          BINARY_PID=$!
          trap 'kill $BINARY_PID 2>/dev/null; rm -rf "$WORKSPACE"' EXIT

          for i in $(seq 1 60); do
            if curl -s "http://localhost:$PORT/" > /dev/null 2>&1; then
              echo "Server ready on port $PORT (PID $BINARY_PID)"
              break
            fi
            if ! kill -0 $BINARY_PID 2>/dev/null; then
              echo "Binary process died unexpectedly"
              exit 1
            fi
            sleep 0.5
          done

          if ! curl -s "http://localhost:$PORT/" > /dev/null 2>&1; then
            echo "Server failed to start within 30s"
            exit 1
          fi

          export PLAYWRIGHT_BASE_URL="http://localhost:$PORT"
          cd packages/e2e
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            bunx playwright test "tests/${{ matrix.test.path }}.e2e.ts"
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          DEFAULT_MODEL: sonnet
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-no-llm-results-${{ matrix.test.name }}
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          retention-days: 7

  # ============================================
  # E2E TESTS - LLM Required (Matrix, max 4 parallel)
  # Tests that send messages and wait for LLM responses
  # Run on: PR to main, push to dev, push to main (skip on PR to dev)
  # ============================================

  e2e-llm:
    name: E2E LLM (${{ matrix.test.name }})
    runs-on: ubuntu-latest
    needs: [build, discover]
    # Runs when build succeeds; skip release PRs to avoid blocking releases with flaky tests
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.discover.result == 'success' &&
      (github.event_name != 'pull_request' || !contains(github.event.pull_request.title, 'release'))
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests_llm) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install sandbox dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat

      - name: Setup Dev Proxy
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-devproxy

      - name: Install dependencies
        run: |
          echo "Starting bun install at $(date)"
          timeout 180 bun install --verbose 2>&1 || {
            echo "bun install timed out or failed"
            exit 1
          }
          echo "Finished bun install at $(date)"

      - name: Install Playwright browsers
        run: cd packages/e2e && bunx playwright install chromium

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: kai-linux-x64-e2e
          path: dist/bin/

      - name: Run E2E LLM test (${{ matrix.test.name }})
        run: |
          chmod +x dist/bin/kai-linux-x64
          WORKSPACE=$(mktemp -d)
          PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("",0)); print(s.getsockname()[1]); s.close()')
          echo "Starting binary on port $PORT with workspace $WORKSPACE"

          ./dist/bin/kai-linux-x64 --port "$PORT" "$WORKSPACE" &
          BINARY_PID=$!
          trap 'kill $BINARY_PID 2>/dev/null; rm -rf "$WORKSPACE"' EXIT

          for i in $(seq 1 60); do
            if curl -s "http://localhost:$PORT/" > /dev/null 2>&1; then
              echo "Server ready on port $PORT (PID $BINARY_PID)"
              break
            fi
            if ! kill -0 $BINARY_PID 2>/dev/null; then
              echo "Binary process died unexpectedly"
              exit 1
            fi
            sleep 0.5
          done

          if ! curl -s "http://localhost:$PORT/" > /dev/null 2>&1; then
            echo "Server failed to start within 30s"
            exit 1
          fi

          export PLAYWRIGHT_BASE_URL="http://localhost:$PORT"
          cd packages/e2e
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            bunx playwright test "tests/${{ matrix.test.path }}.e2e.ts"
        env:
          NEOKAI_USE_DEV_PROXY: "1"
          ANTHROPIC_BASE_URL: "http://127.0.0.1:8000"
          ANTHROPIC_API_KEY: "sk-devproxy-test-key"
          ANTHROPIC_AUTH_TOKEN: ""
          CLAUDE_CODE_OAUTH_TOKEN: ""
          CI: true

      - name: Stop Dev Proxy
        if: always()
        run: |
          if [ -n "$DEVPROXY_PID" ]; then
            kill $DEVPROXY_PID 2>/dev/null || true
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results-llm-${{ matrix.test.name }}
          path: |
            packages/e2e/test-results/
            packages/e2e/playwright-report/
          retention-days: 7

  # ============================================
  # GATE - All tests must pass (handles conditional job results)
  # ============================================

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: always()
    needs:
      - enforce-merge-policy
      - check
      - test-daemon-online
      - test-daemon-shared-unit
      - test-web
      - test-cli
      - coverage-gate
      - build
      - discover
      - e2e-no-llm
      - e2e-llm

    steps:
      - name: Check all jobs passed
        run: |
          FAILED=0

          # Merge policy check (only for PRs to main)
          if [[ "${{ needs.enforce-merge-policy.result }}" == "failure" ]]; then
            echo "❌ Merge policy failed"
            FAILED=1
          fi

          # Check job: PR to dev, PR to main, push to main (skip on push to dev)
          if [[ "${{ needs.check.result }}" == "failure" ]]; then
            echo "❌ check failed"
            FAILED=1
          fi

          # test-daemon-online: PR to dev, PR to main, push to main (skip on push to dev)
          if [[ "${{ needs.test-daemon-online.result }}" == "failure" ]]; then
            echo "❌ test-daemon-online failed"
            FAILED=1
          fi

          # test-daemon-shared-unit: PR to dev, PR to main, push to main (skip on push to dev)
          if [[ "${{ needs.test-daemon-shared-unit.result }}" == "failure" ]]; then
            echo "❌ test-daemon-shared-unit failed"
            FAILED=1
          fi

          # test-web: PR to main, push to main (skip on PR to dev and push to dev)
          if [[ "${{ needs.test-web.result }}" == "failure" ]]; then
            echo "❌ test-web failed"
            FAILED=1
          fi

          # test-cli: PR to main, push to main (skip on PR to dev and push to dev)
          if [[ "${{ needs.test-cli.result }}" == "failure" ]]; then
            echo "❌ test-cli failed"
            FAILED=1
          fi

          # coverage-gate: PR to dev, PR to main, push to main (skip on push to dev)
          if [[ "${{ needs.coverage-gate.result }}" == "failure" ]]; then
            echo "❌ coverage-gate failed"
            FAILED=1
          fi

          # build: PR to main, push to dev, push to main (skip on PR to dev)
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ build failed"
            FAILED=1
          fi

          # discover: PR to main, push to dev, push to main (skip on PR to dev)
          if [[ "${{ needs.discover.result }}" == "failure" ]]; then
            echo "❌ discover failed"
            FAILED=1
          fi

          # e2e-no-llm: PR to main, push to dev, push to main (skip on PR to dev)
          if [[ "${{ needs.e2e-no-llm.result }}" == "failure" ]]; then
            echo "❌ e2e-no-llm failed"
            FAILED=1
          fi

          # e2e-llm: PR to main, push to dev, push to main (skip on PR to dev)
          if [[ "${{ needs.e2e-llm.result }}" == "failure" ]]; then
            echo "❌ e2e-llm failed"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "One or more required jobs failed:"
            echo "  enforce-merge-policy: ${{ needs.enforce-merge-policy.result }}"
            echo "  check: ${{ needs.check.result }}"
            echo "  test-daemon-online: ${{ needs.test-daemon-online.result }}"
            echo "  test-daemon-shared-unit: ${{ needs.test-daemon-shared-unit.result }}"
            echo "  test-web: ${{ needs.test-web.result }}"
            echo "  test-cli: ${{ needs.test-cli.result }}"
            echo "  coverage-gate: ${{ needs.coverage-gate.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  discover: ${{ needs.discover.result }}"
            echo "  e2e-no-llm: ${{ needs.e2e-no-llm.result }}"
            echo "  e2e-llm: ${{ needs.e2e-llm.result }}"
            exit 1
          fi
          echo "All tests passed!"
